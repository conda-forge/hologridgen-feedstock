{% set name = "hologridgen" %}
{% set version = "1.0.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/hologridgen-{{ version }}.tar.gz
  sha256: 025476a0dc827da21b5df4a329dc0375c736a7e98b0628eb7faf1401e8890934

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools
    - pip
  run:
    - python >={{ python_min }}
    - geopandas >=0.8.1
    - holoviews >=1.13.5
    - panel >=0.10.0
    - param >=1.10.0
    - pygridgen >0.2
    - geoviews

test:
  requires:
    - python {{ python_min }}
  imports:
    - hologridgen
  # Cannot use pip check b/c pip does not recognize pygridgen 0.2.dev0 as >= 0.2 :-/
  # commands:
  #   - pip check
  # requires:
  #   - pip

about:
  home: https://github.com/pygridgen/hologridgen
  summary: Interactive tool for the generation of orthonormal grids using pygridgen and the HoloViz tool suite for use within Jupyter notebooks or deployable with Panel
  license: CC0-1.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - ocefpaf
